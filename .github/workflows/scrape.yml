name: Scrape and Commit

on:
  schedule:
    - cron: '0 12 * * *'  # Runs daily at 7am Central (noon UTC)
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  scrape:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Scrape and render MN
        env:
          TM_API_KEY: ${{ secrets.TM_API_KEY }}
        working-directory: mn
        run: |
          python scraper.py
          python render.py

      - name: Scrape and render TN
        env:
          TM_API_KEY: ${{ secrets.TM_API_KEY }}
        working-directory: tn
        run: |
          python scraper.py
          python render.py

      - name: Commit updated output
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add mn/ tn/
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "Daily scrape $(date -u +%Y-%m-%d)"
          git push
