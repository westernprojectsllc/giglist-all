<title>Giglist B/W mockups — Ledger refinements</title>
<style>
  :root {
    --paper: #ffffff;
    --ink: #000000;
    --klein: #002FA7;
    --hl2-bg: #E4E4E2; /* Stone — preferred grey (see DESIGN.md) */
    --hl2-fg: #000000;
    --mono: ui-monospace, "SF Mono", Menlo, Consolas, "Liberation Mono", monospace;
  }
  @media (prefers-color-scheme: dark) {
    :root { --paper: #000000; --ink: #ffffff; }
  }
  :root[data-theme="dark"]  { --paper: #000000; --ink: #ffffff; }
  :root[data-theme="light"] { --paper: #ffffff; --ink: #000000; }

  html, body { background: var(--paper); color: var(--ink); }
  body { margin: 0; font-family: var(--mono); }
  a { color: var(--ink); }
  * { box-sizing: border-box; }
  :focus-visible { outline: 2px solid var(--ink); outline-offset: 1px; }

  /* ---------- chrome: gl logo button (landing-page mark, opens menu) ---------- */
  #menu-btn {
    position: fixed; top: 0; left: 0; z-index: 60;
    background: var(--klein); color: #C7CCD6;
    border: 0; cursor: pointer;
    font-family: "Helvetica Neue", -apple-system, "Segoe UI", Arial, sans-serif;
    font-weight: 800; font-size: 15px; letter-spacing: -0.03em; line-height: 1;
    padding: 12px 19px 13px; text-align: left;
  }
  #menu-btn:hover { color: #ffffff; }
  #menu-btn.banner { width: 100%; padding-left: 24px; display: flex; align-items: center; }
  #menu-btn .wk { display: none; }
  body.wk-banner #menu-btn .wk {
    display: block; margin-left: auto; padding-right: 5px;
    font-family: var(--mono); font-size: 11px; font-weight: 400;
    letter-spacing: .22em; color: #ffffff;
  }
  body.wk-banner .v1 .week-h { display: none; }

  /* ---------- sidebar : inverted, compact ---------- */
  #sidebar {
    position: fixed; top: 0; left: 0; bottom: 0; z-index: 70;
    width: 208px; max-width: 82vw;
    background: var(--ink); color: var(--paper);
    transform: translateX(-100%);
    transition: transform .16s ease;
    overflow-y: auto;
    font-size: 11px;
  }
  #sidebar.open { transform: translateX(0); }
  @media (prefers-reduced-motion: reduce) { #sidebar { transition: none; } }
  #sidebar a { color: var(--paper); text-decoration: none; }
  #sidebar a:hover { text-decoration: underline; text-underline-offset: 3px; }
  #sidebar .sb-head {
    display: flex; justify-content: space-between; align-items: center;
    border-bottom: 1px solid var(--paper); padding: 8px 10px;
  }
  #sidebar .sb-head span { letter-spacing: .16em; font-size: 10px; }
  #sb-close {
    background: none; border: 1px solid var(--paper); color: var(--paper);
    font-family: var(--mono); font-size: 9px; letter-spacing: .1em;
    padding: 2px 6px; cursor: pointer;
  }
  #sb-close:hover { background: var(--paper); color: var(--ink); }
  #sidebar h3 {
    margin: 0; padding: 9px 10px 4px;
    font-size: 9px; font-weight: 400; letter-spacing: .22em; text-transform: uppercase;
    border-top: 1px solid var(--paper);
    display: flex; justify-content: space-between; align-items: baseline;
  }
  #sidebar .sb-head + h3 { border-top: 0; }
  #sidebar h3 button {
    background: none; border: 0; color: var(--paper); font-family: var(--mono);
    font-size: 9px; letter-spacing: .1em; cursor: pointer; padding: 0;
    text-decoration: underline; text-underline-offset: 2px;
  }
  #sidebar ul { list-style: none; margin: 0 0 6px; padding: 0 10px; }
  #sidebar li { margin: 0; }
  #sidebar ul a { display: block; padding: 2px 0; }
  #sidebar .now { font-size: 9px; letter-spacing: .08em; }

  /* venue rows with cycling state icon */
  #sb-venues li {
    display: flex; align-items: center; gap: 7px; padding: 1.5px 0;
  }
  .v-ico {
    flex: none; width: 14px; height: 14px; padding: 0; cursor: pointer;
    border: 1px solid var(--paper);
  }
  .v-ico[data-state="show"] { background: var(--paper); }
  .v-ico[data-state="hide"] { background: var(--ink); }
  .v-ico[data-state="hl"]   { background: var(--klein); border-color: var(--klein); }
  .v-ico[data-state="hl2"]  { background: var(--hl2-bg); border-color: var(--hl2-bg); }
  .v-name { min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  #sb-venues li[data-state="hide"] .v-name { opacity: .45; text-decoration: line-through; }
  #sb-venues li[data-state="hl"] .v-name,
  #sb-venues li[data-state="hl2"] .v-name { font-weight: 700; }

  /* collapsible categories */
  #sidebar h3.cat { cursor: pointer; user-select: none; }
  #sidebar h3 .cat-r { display: flex; gap: 9px; align-items: baseline; }
  #sidebar h3 .ind { font-size: 10px; width: 8px; text-align: center; }

  #scrim { position: fixed; inset: 0; z-index: 65; display: none; }
  #scrim.open { display: block; }

  /* ---------- variant switcher (mockup chrome) ---------- */
  #switcher {
    position: fixed; bottom: 0; right: 0; z-index: 60;
    display: flex; flex-direction: column; align-items: stretch;
    border: 2px solid var(--ink); border-right: 0; border-bottom: 0;
    background: var(--paper);
  }
  #switcher .sw-row { display: flex; align-items: stretch; flex-wrap: wrap; }
  #switcher .sw-row + .sw-row { border-top: 1px solid var(--ink); }
  #switcher .chip {
    display: inline-block; width: 11px; height: 11px;
    border: 1px solid var(--ink); margin-right: 6px; vertical-align: -1px;
  }
  #switcher button[aria-pressed="true"] .chip { border-color: var(--paper); }
  #switcher .sw-label {
    font-size: 9px; letter-spacing: .14em; padding: 9px 10px;
    border-right: 2px solid var(--ink); text-transform: uppercase;
    display: flex; align-items: center;
  }
  #switcher button {
    background: var(--paper); color: var(--ink); border: 0;
    border-right: 1px solid var(--ink);
    font-family: var(--mono); font-size: 11px; padding: 9px 12px; cursor: pointer;
  }
  #switcher button:last-child { border-right: 0; }
  #switcher button[aria-pressed="true"] { background: var(--ink); color: var(--paper); }

  main { padding-bottom: 72px; }

  /* ---------- shared ledger row ---------- */
  .row {
    display: grid; grid-template-columns: 74px 168px 1fr max-content;
    gap: 0 12px; align-items: baseline;
    padding: 3px 8px; border-bottom: 1px solid var(--ink);
    font-size: 12px; line-height: 1.35;
  }
  .row .t   { font-size: 11px; white-space: nowrap; }
  .row .ven { font-size: 11px; text-transform: uppercase; letter-spacing: .03em; overflow-wrap: break-word; }
  .row .act { font-weight: 700; }
  .row .sup { font-weight: 400; font-size: 11px; }
  .flag {
    background: var(--ink); color: var(--paper);
    font-size: 9px; letter-spacing: .12em; padding: 1px 5px; text-transform: uppercase;
  }
  .row.hl { background: var(--klein); color: #ffffff; }
  .row.hl .flag { background: #ffffff; color: var(--klein); }
  .row.hl2 { background: var(--hl2-bg); color: var(--hl2-fg); }
  .row.hl2 .flag { background: var(--hl2-fg); color: var(--hl2-bg); }
  @media (max-width: 640px) {
    .row { grid-template-columns: 64px 1fr max-content; row-gap: 0; }
    .row .ven { grid-column: 2; grid-row: 1; }
    .row .act { grid-column: 2; grid-row: 2; }
    .row .t   { grid-row: 1; }
  }

  .empty-note { padding: 28px 8px; font-size: 11px; letter-spacing: .1em; text-transform: uppercase; }

  /* =============================================================
     VARIANT 1 — LEDGER TIGHT : slim black day bars, compact rows
     ============================================================= */
  .v1 { max-width: 940px; margin: 0 auto; padding: 46px 16px 0; }
  .v1 .week-h {
    margin: 34px 0 0; padding: 5px 0 4px;
    font-size: 13px; font-weight: 400; letter-spacing: .22em; text-transform: uppercase;
  }
  .v1 .wk-sec:first-child .week-h { margin-top: 4px; }
  .v1 .day-h {
    margin: 10px 0 0; padding: 3px 8px;
    background: var(--ink); color: var(--paper);
    font-size: 11px; font-weight: 700; letter-spacing: .16em; text-transform: uppercase;
  }
  #switcher .sw-label:not(:first-child) { border-left: 2px solid var(--ink); }
</style>

const esc = s => String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
const WD = ["SUN","MON","TUE","WED","THU","FRI","SAT"];
const WD_FULL = ["SUNDAY","MONDAY","TUESDAY","WEDNESDAY","THURSDAY","FRIDAY","SATURDAY"];
const MO = ["JAN","FEB","MAR","APR","MAY","JUN","JUL","AUG","SEP","OCT","NOV","DEC"];

function d(iso){ const [y,m,dd] = iso.split("-").map(Number); return new Date(y, m-1, dd); }
function timeStr(s){
  const up = t => t ? t.toUpperCase().replace(/\s+/g,"") : null;
  const doors = up(s.doors), time = up(s.time);
  if (doors && time) return doors + "/" + time;
  if (time) return time;
  if (doors) return "DRS" + doors;
  return "·";
}
function mondayOf(iso){
  const dt = d(iso), off = (dt.getDay() + 6) % 7;
  dt.setDate(dt.getDate() - off);
  return dt;
}
function weekLabel(mon){
  const sun = new Date(mon); sun.setDate(sun.getDate() + 6);
  const a = MO[mon.getMonth()] + " " + mon.getDate();
  const b = (sun.getMonth() === mon.getMonth() ? "" : MO[sun.getMonth()] + " ") + sun.getDate();
  return "WEEK OF " + a + " – " + b;
}

function grouped(){
  const weeks = new Map();
  for (const s of SHOWS){
    const mon = mondayOf(s.sort_date), wk = mon.getFullYear() + "-" + mon.getMonth() + "-" + mon.getDate();
    if (!weeks.has(wk)) weeks.set(wk, { mon, days: new Map() });
    const w = weeks.get(wk);
    if (!w.days.has(s.sort_date)) w.days.set(s.sort_date, []);
    w.days.get(s.sort_date).push(s);
  }
  return [...weeks.values()].sort((a,b)=>a.mon-b.mon).map(w => ({
    label: weekLabel(w.mon),
    days: [...w.days.entries()].sort((a,b)=>a[0]<b[0]?-1:1)
          .map(([iso, shows]) => ({ iso, shows }))
  }));
}
const DATA = grouped();
const VENUES = [...new Set(SHOWS.map(s => s.venue))].sort((a,b)=>a.localeCompare(b));

/* venue state: "show" | "hl" (blue) | "hl2" (grey) | "hide" */
const vstate = new Map(VENUES.map(v => [v, "show"]));

function visibleDays(week){
  return week.days
    .map(day => ({ iso: day.iso, shows: day.shows.filter(s => vstate.get(s.venue) !== "hide") }))
    .filter(day => day.shows.length);
}
function sup(s){
  return s.supports && s.supports.length
    ? ' <span class="sup">+ ' + esc(s.supports.join(", ")) + '</span>' : "";
}
function rowHtml(s){
  const st = vstate.get(s.venue);
  const hl = st === "hl" ? " hl" : st === "hl2" ? " hl2" : "";
  return '<div class="row' + hl + '"><span class="t">' + timeStr(s) + '</span>'
    + '<span class="ven">' + esc(s.venue) + '</span>'
    + '<span class="act">' + esc(s.title) + sup(s) + '</span>'
    + '<span>' + (s.sold_out ? '<span class="flag">Sold out</span>' : '') + '</span></div>';
}
function emptyNote(){
  return '<p class="empty-note">All venues hidden — reopen the menu to bring some back.</p>';
}

/* ---------- variant renderer ---------- */
function render1(){
  let h = '<div class="v1">', any = false;
  for (const w of DATA){
    h += '<section class="wk-sec" data-label="' + w.label + '">';
    h += '<h2 class="week-h">' + w.label + '</h2>';
    for (const day of visibleDays(w)){
      any = true;
      const dt = d(day.iso);
      h += '<h3 class="day-h" data-count="' + day.shows.length + '">' + WD_FULL[dt.getDay()] + ' — ' + MO[dt.getMonth()] + ' '
         + String(dt.getDate()).padStart(2,"0") + '</h3>';
      h += day.shows.map(rowHtml).join("");
    }
    h += '</section>';
  }
  return h + (any ? "" : emptyNote()) + '</div>';
}

const app = document.getElementById("app");
function show(){ app.innerHTML = render1(); updateWkLabel(); }

/* banner week label follows the week section in view */
function updateWkLabel(){
  const wkLabel = document.getElementById("wk-label");
  if (!document.body.classList.contains("wk-banner")) { wkLabel.textContent = ""; return; }
  const secs = document.querySelectorAll(".wk-sec");
  let label = secs.length ? secs[0].dataset.label : "";
  const y = menuBtn.offsetHeight + 12;
  for (const s of secs){
    if (s.getBoundingClientRect().top <= y) label = s.dataset.label;
  }
  wkLabel.textContent = label;
}
addEventListener("scroll", updateWkLabel, { passive: true });

document.getElementById("switcher").addEventListener("click", e => {
  const g = e.target.closest("button[data-grey]");
  if (g) {
    document.documentElement.style.setProperty("--hl2-bg", g.dataset.bg);
    document.documentElement.style.setProperty("--hl2-fg", g.dataset.fg);
    document.querySelectorAll("#switcher button[data-grey]").forEach(b =>
      b.setAttribute("aria-pressed", String(b === g)));
  }
  const bt = e.target.closest("button[data-btn]");
  if (bt) {
    const mode = bt.dataset.btn;
    menuBtn.classList.toggle("banner", mode !== "box");
    document.body.classList.toggle("wk-banner", mode === "wk");
    document.querySelectorAll("#switcher button[data-btn]").forEach(b =>
      b.setAttribute("aria-pressed", String(b === bt)));
    updateWkLabel();
  }
});

/* ---------- sidebar: venue list, icon cycles show → hl → hl2 → hide ---------- */
const STATE_LABEL = { show: "shown", hl: "highlighted blue", hl2: "highlighted grey", hide: "hidden" };
const CYCLE = { show: "hl", hl: "hl2", hl2: "hide", hide: "show" };
const venuesUl = document.getElementById("sb-venues");
function renderVenues(){
  venuesUl.innerHTML = VENUES.map(v => {
    const st = vstate.get(v);
    return '<li data-state="' + st + '" data-venue="' + esc(v) + '">'
      + '<button class="v-ico" data-state="' + st + '" aria-label="' + esc(v) + ': ' + STATE_LABEL[st] + '. Click to change."></button>'
      + '<span class="v-name">' + esc(v) + '</span></li>';
  }).join("");
}
renderVenues();

venuesUl.addEventListener("click", e => {
  const ico = e.target.closest(".v-ico");
  if (!ico) return;
  const v = ico.closest("li").dataset.venue;
  vstate.set(v, CYCLE[vstate.get(v)]);
  ico.dataset.state = vstate.get(v);
  ico.closest("li").dataset.state = vstate.get(v);
  ico.setAttribute("aria-label", v + ': ' + STATE_LABEL[vstate.get(v)] + '. Click to change.');
  show();
});
document.getElementById("v-reset").addEventListener("click", e => {
  e.stopPropagation();
  VENUES.forEach(v => vstate.set(v, "show"));
  renderVenues(); show();
});

/* ---------- sidebar: collapsible categories ---------- */
document.querySelectorAll("#sidebar h3.cat").forEach(h => {
  h.addEventListener("click", e => {
    if (e.target.closest("#v-reset")) return;
    const ul = h.nextElementSibling;
    const opening = ul.hasAttribute("hidden");
    ul.toggleAttribute("hidden", !opening);
    h.setAttribute("aria-expanded", String(opening));
    h.querySelector(".ind").textContent = opening ? "−" : "+";
  });
  h.addEventListener("keydown", e => {
    if (e.key === "Enter" || e.key === " ") { e.preventDefault(); h.click(); }
  });
});

/* ---------- sidebar: weeks + open/close ---------- */
document.getElementById("sb-weeks").innerHTML = DATA.map((w,i) =>
  '<li><a href="#" class="dead">' + w.label.replace("WEEK OF ","").toLowerCase() +
  (i===0 ? ' <span class="now">← this week</span>' : '') + '</a></li>').join("")
  + ['Aug 3 – 9','Aug 10 – 16','Aug 17 – 23','Aug 24 – 30'].map(t =>
  '<li><a href="#" class="dead">' + t.toLowerCase() + '</a></li>').join("");

const sidebar = document.getElementById("sidebar");
const scrim = document.getElementById("scrim");
const menuBtn = document.getElementById("menu-btn");
function setSidebar(open){
  sidebar.classList.toggle("open", open);
  scrim.classList.toggle("open", open);
  menuBtn.setAttribute("aria-expanded", String(open));
}
menuBtn.addEventListener("click", () => setSidebar(!sidebar.classList.contains("open")));
document.getElementById("sb-close").addEventListener("click", () => setSidebar(false));
scrim.addEventListener("click", () => setSidebar(false));
document.addEventListener("keydown", e => {
  if (e.key === "Escape") setSidebar(false);
});
sidebar.addEventListener("click", e => {
  if (e.target.closest("a.dead")) e.preventDefault();
});

/* default to the preferred setup (DESIGN.md): Banner + Week, Stone grey */
menuBtn.classList.add("banner");
document.body.classList.add("wk-banner");
show();
</script>
